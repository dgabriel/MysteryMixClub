name: CI

on:
  pull_request:
    branches:
      - main
      - develop

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Non-blocking (MYS-47): surface prod-dependency advisories on every PR so a
      # vulnerable runtime dep can't regress silently. Dev-only tooling advisories
      # are excluded to keep the signal actionable; a red step never blocks merge.
      - name: Dependency audit (prod deps)
        run: npm audit --omit=dev --audit-level=moderate
        continue-on-error: true

  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # app.db.session builds the engine at import from DATABASE_URL, and the test
    # suite (tests/conftest.py) runs against a real Postgres at this URL. SECRET_KEY
    # is needed so JWT signing/verification works in the auth tests. These are
    # throwaway CI values — not real secrets.
    env:
      DATABASE_URL: postgresql+asyncpg://mmc:mmc@localhost:5432/mysterymixclub_test
      SECRET_KEY: ci-test-secret-not-for-production
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mmc
          POSTGRES_PASSWORD: mmc
          POSTGRES_DB: mysterymixclub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mmc -d mysterymixclub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        run: mypy app

      # Guards against "model added but migration missing": prove the migrations
      # apply cleanly (and reverse) against a fresh DB on every PR. Uses a separate
      # throwaway database so it never collides with the schema pytest's conftest
      # builds via create_all on mysterymixclub_test.
      - name: Alembic migrations apply
        run: |
          PGPASSWORD=mmc psql -h localhost -U mmc -d mysterymixclub_test \
            -c "CREATE DATABASE mmc_migrate_check;"
          export DATABASE_URL=postgresql+asyncpg://mmc:mmc@localhost:5432/mmc_migrate_check
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Pytest (with coverage)
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

      # Non-blocking (MYS-47): pip-audit against the resolved env on every PR.
      # --skip-editable skips the local editable package (not on PyPI); a red step
      # never blocks merge but surfaces a newly-vulnerable dependency.
      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --skip-editable
        continue-on-error: true
