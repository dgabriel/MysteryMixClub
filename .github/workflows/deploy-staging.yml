name: Deploy Staging

on:
  push:
    branches:
      - develop

# Never run two staging deploys concurrently; let the newest win.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging Droplet
    # Runs on a self-hosted runner living ON the staging Droplet itself
    # (registered manually, systemd service `actions.runner.*`, user
    # mysterymixclub). GitHub-hosted runners can no longer reach this box:
    # MYS-224 restricted the cloud firewall's inbound SSH to a single admin
    # CIDR, and GitHub's runner IP ranges are too broad/volatile to safely
    # allowlist — appleboy/ssh-action (this job's previous approach) started
    # timing out the moment that firewall went live. Running the job directly
    # on the box sidesteps needing inbound SSH from GitHub entirely, mirroring
    # the pattern deploy-prod.yml already uses (see its comments, and
    # docs/prod-setup.md §5, which flagged this as "relevant once/if staging
    # ever gets its own self-hosted runner too").
    runs-on: [self-hosted, staging]
    environment: staging
    steps:
      # No actions/checkout here — deploy-staging.sh manages its own
      # persistent clone at /home/mysterymixclub/app (placed there by
      # scripts/bootstrap-droplet.sh) and syncs it to origin/develop itself,
      # so a deploy never executes a stale copy of the script that then
      # changes underneath it.
      - name: Deploy
        run: |
          cd /home/mysterymixclub/app
          git fetch --prune origin
          git checkout -f -B develop origin/develop
          ./scripts/deploy-staging.sh

      # Simple pass/fail notification (Actions log only, for now).
      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Staging deploy to ${{ secrets.STAGING_HOST }} succeeded"
          else
            echo "❌ Staging deploy to ${{ secrets.STAGING_HOST }} failed"
            exit 1
          fi
