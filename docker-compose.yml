# Local development stack. Brings up Postgres for the FastAPI backend.
# Usage: docker compose up -d   (then run the backend/frontend on the host)
services:
  db:
    image: postgres:16-alpine
    container_name: mmc-postgres
    environment:
      POSTGRES_USER: mmc
      POSTGRES_PASSWORD: mmc
      POSTGRES_DB: mysterymixclub
    ports:
      - "5432:5432"
    volumes:
      - mmc-pgdata:/var/lib/postgresql/data
      # Creates the app DB (via POSTGRES_DB) plus mysterymixclub_test on first init.
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmc -d mysterymixclub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mmc-pgdata:
