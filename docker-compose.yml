services:
  db:
    image: postgres:16-alpine
    container_name: mmc-postgres
    environment:
      POSTGRES_USER: mmc
      POSTGRES_PASSWORD: mmc
      POSTGRES_DB: mysterymixclub
    ports:
      - "5432:5432"
    volumes:
      - mmc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmc -d mysterymixclub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mmc-pgdata:
