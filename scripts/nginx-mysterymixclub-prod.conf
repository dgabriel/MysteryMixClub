# MysteryMixClub — production Nginx site (HTTPS via a real Let's Encrypt cert).
#
# Unlike staging, the domain is known ahead of provisioning, so this config
# skips the self-signed-cert bootstrap step entirely and goes straight to
# certbot. It also carries none of staging's anti-crawl basic auth — these are
# real users signing in, and Basic and the app's `Authorization: Bearer` share
# the same header (see the /api/ block below), so basic auth would actively
# break API calls, not just annoy visitors.
#
# Bare apex is canonical, matching technical-design.md §5's magic-link example
# (`https://mysterymixclub.com/auth/verify?...`); `www` 301-redirects to it.
# Install on the Droplet:
#   sudo cp scripts/nginx-mysterymixclub-prod.conf \
#       /etc/nginx/sites-available/mysterymixclub-prod
#   sudo ln -sf /etc/nginx/sites-available/mysterymixclub-prod \
#       /etc/nginx/sites-enabled/mysterymixclub-prod
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mysterymixclub.com -d www.mysterymixclub.com
# certbot rewrites the ssl_certificate directives below and installs the
# auto-renew timer.

# Redirect all plain HTTP (both host names) to HTTPS apex.
server {
    listen 80;
    listen [::]:80;
    server_name mysterymixclub.com www.mysterymixclub.com;
    return 301 https://mysterymixclub.com$request_uri;
}

# www over HTTPS redirects to the canonical apex host. Needs its own server
# block because it shares the same cert (SAN covers both names) but must not
# fall through to the app.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.mysterymixclub.com;

    ssl_certificate     /etc/letsencrypt/live/mysterymixclub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mysterymixclub.com/privkey.pem;

    return 301 https://mysterymixclub.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mysterymixclub.com;

    ssl_certificate     /etc/letsencrypt/live/mysterymixclub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mysterymixclub.com/privkey.pem;

    # HSTS: tell browsers to use HTTPS only for 2 years (incl. subdomains).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /var/www/mysterymixclub;
    index index.html;

    # SPA: serve the React build, falling back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy everything under /api/ to the FastAPI service. Passing the
    # upstream without a URI preserves the original /api/... path.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check: map /health to the backend's real route (/api/v1/healthz).
    location = /health {
        proxy_pass http://127.0.0.1:8000/api/v1/healthz;
        proxy_set_header Host $host;
    }
}
