# MysteryMixClub — staging Nginx site (HTTPS via self-signed cert on the raw IP).
#
# Install on the Droplet:
#   sudo bash scripts/generate-self-signed-cert.sh        # creates the cert first
#   sudo cp scripts/nginx-mysterymixclub-staging.conf \
#       /etc/nginx/sites-available/mysterymixclub-staging
#   sudo ln -sf /etc/nginx/sites-available/mysterymixclub-staging \
#       /etc/nginx/sites-enabled/mysterymixclub-staging
#   sudo nginx -t && sudo systemctl reload nginx
#
# No domain yet, so TLS uses a self-signed certificate — browsers show a warning
# testers must click through. Once a domain points at the box, run
# `sudo certbot --nginx -d <domain>` to swap in a trusted Let's Encrypt cert
# (certbot rewrites the cert directives below).

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;  # raw IP for now; set to your domain once DNS exists

    ssl_certificate     /etc/ssl/mmc-staging/fullchain.pem;
    ssl_certificate_key /etc/ssl/mmc-staging/privkey.pem;

    root /var/www/mysterymixclub;
    index index.html;

    # Keep staging out of search indexes and away from casual visitors.
    # Create the password file with (username is mmctest):
    #   sudo htpasswd -bc /etc/nginx/.htpasswd-mmc-staging mmctest "$BASIC_AUTH_PASSWORD"
    auth_basic "MysteryMixClub Staging";
    auth_basic_user_file /etc/nginx/.htpasswd-mmc-staging;

    # SPA: serve the React build, falling back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy everything under /api/ to the FastAPI service. Passing the
    # upstream without a URI preserves the original /api/... path.
    #
    # No basic auth here: the API authenticates itself (JWT Bearer + one-time
    # magic-link tokens + refresh cookie). Basic auth would actually break it —
    # HTTP Basic and the app's `Authorization: Bearer` both use the Authorization
    # header, so an authenticated API call can't also carry the Basic credential
    # and nginx would 401 it. Basic auth stays on the SPA/HTML above (anti-crawl).
    location /api/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check: map /health to the backend's real route (/api/v1/healthz).
    # No basic auth so external uptime checks can reach it.
    location = /health {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/v1/healthz;
        proxy_set_header Host $host;
    }
}
