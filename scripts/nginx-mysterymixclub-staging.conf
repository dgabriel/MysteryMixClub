# MysteryMixClub — staging Nginx site.
#
# Install on the Droplet:
#   sudo cp scripts/nginx-mysterymixclub-staging.conf \
#       /etc/nginx/sites-available/mysterymixclub-staging
#   sudo ln -sf /etc/nginx/sites-available/mysterymixclub-staging \
#       /etc/nginx/sites-enabled/mysterymixclub-staging
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL: run `sudo certbot --nginx -d staging.mysterymixclub.com`. Certbot rewrites
# this file to add the `listen 443 ssl` directives + an HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name staging.mysterymixclub.com;  # change to your domain, or `_` for IP-only

    root /var/www/mysterymixclub;
    index index.html;

    # Keep staging out of search indexes and away from casual visitors.
    # Create the password file with (username is mmctest):
    #   sudo htpasswd -bc /etc/nginx/.htpasswd-mmc-staging mmctest "$BASIC_AUTH_PASSWORD"
    auth_basic "MysteryMixClub Staging";
    auth_basic_user_file /etc/nginx/.htpasswd-mmc-staging;

    # SPA: serve the React build, falling back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy everything under /api/ to the FastAPI service. Passing the
    # upstream without a URI preserves the original /api/... path.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check: map /health to the backend's real route (/api/v1/healthz).
    # No basic auth so external uptime checks can reach it.
    location = /health {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/v1/healthz;
        proxy_set_header Host $host;
    }

    # --- SSL placeholder -----------------------------------------------------
    # `certbot --nginx` inserts the managed certificate directives here and adds
    # a companion server block listening on 443. Do not hand-edit that section.
}
